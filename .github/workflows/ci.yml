name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: corepack enable && corepack prepare pnpm@10.33.2 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm run licenses:check
      - run: pnpm run compose:check
      - run: pnpm run check
      - run: pnpm run eval

  audit:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: corepack enable && corepack prepare pnpm@10.33.2 --activate
      - run: pnpm install --frozen-lockfile
      - name: pnpm audit (production dependencies)
        run: pnpm audit --prod --audit-level=high

  windows-smoke:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: corepack enable && corepack prepare pnpm@10.33.2 --activate
      - run: pnpm install --frozen-lockfile
      - name: Build on Windows
        shell: pwsh
        run: pnpm run build
      - name: Unit + integration tests on Windows
        shell: pwsh
        run: pnpm run test
      - name: Eval gate on Windows (hash embedding)
        shell: pwsh
        env:
          SSTICKER_EMBEDDING_PROVIDER: hash
        run: pnpm run eval

  admin-e2e:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: corepack enable && corepack prepare pnpm@10.33.2 --activate
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm run test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7


