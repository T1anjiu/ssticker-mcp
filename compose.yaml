# ssticker-mcp - development compose
#
# Default values are safe to run on a developer laptop. Production deploys
# should use compose.prod.yaml, which requires OIDC + signed URLs over TLS.
#
#   docker compose up -d               # this file (development)
#   docker compose -f compose.prod.yaml up -d   # production
#
# Note: this dev compose intentionally sets SSTICKER_ALLOW_INSECURE_REMOTE=true
# so the service can bind 0.0.0.0 with auth=none. Do NOT use this compose for
# any non-loopback deploy.

services:
  ssticker:
    build:
      context: .
    image: ssticker-mcp:dev
    init: true
    restart: unless-stopped
    ports:
      - "127.0.0.1:3377:3377"
    environment:
      SSTICKER_HOST: 0.0.0.0
      SSTICKER_PORT: 3377
      SSTICKER_PUBLIC_BASE_URL: ${SSTICKER_PUBLIC_BASE_URL:-http://127.0.0.1:3377}
      SSTICKER_ALLOWED_ORIGINS: ${SSTICKER_ALLOWED_ORIGINS:-http://127.0.0.1:3377,http://localhost:3377}
      SSTICKER_AUTH_MODE: ${SSTICKER_AUTH_MODE:-none}
      SSTICKER_ALLOW_INSECURE_REMOTE: ${SSTICKER_ALLOW_INSECURE_REMOTE:-true}
      SSTICKER_OIDC_ISSUER: ${SSTICKER_OIDC_ISSUER:-}
      SSTICKER_OIDC_AUDIENCE: ${SSTICKER_OIDC_AUDIENCE:-}
      SSTICKER_OIDC_JWKS_URL: ${SSTICKER_OIDC_JWKS_URL:-}
      SSTICKER_EMBEDDING_PROVIDER: ${SSTICKER_EMBEDDING_PROVIDER:-hash}
      SSTICKER_MODEL_ID: ${SSTICKER_MODEL_ID:-intfloat/multilingual-e5-small}
      SSTICKER_LLM_BASE_URL: ${SSTICKER_LLM_BASE_URL:-}
      SSTICKER_LLM_API_KEY: ${SSTICKER_LLM_API_KEY:-}
      SSTICKER_LLM_MODEL: ${SSTICKER_LLM_MODEL:-}
      SSTICKER_LOG_LEVEL: ${SSTICKER_LOG_LEVEL:-info}
    volumes:
      - ssticker-data-dev:/data
    read_only: true
    tmpfs:
      - /tmp:size=256m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

volumes:
  ssticker-data-dev:
